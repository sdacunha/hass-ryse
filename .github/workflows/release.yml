name: Auto Release

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements_test.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  release:
    needs: test
    # Skip if the commit was made by this workflow (version bump)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST_TAG"

      - name: Bump version
        id: bump
        run: |
          # Read current version from manifest
          CURRENT=$(jq -r '.version' custom_components/ryse/manifest.json)
          echo "Current manifest version: $CURRENT"

          # Split into parts and increment patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New version: $NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"
          NEW_VERSION="${{ steps.bump.outputs.version }}"

          # Build changelog from commits since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            CHANGES=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s" "${LATEST_TAG}..HEAD")
          fi

          echo "## What's Changed in v${NEW_VERSION}" > changelog.md
          echo "" >> changelog.md
          echo "$CHANGES" >> changelog.md

          echo "Generated changelog:"
          cat changelog.md

      - name: Update manifest.json
        run: |
          NEW_VERSION="${{ steps.bump.outputs.version }}"
          jq --arg v "$NEW_VERSION" '.version = $v' custom_components/ryse/manifest.json > tmp.json
          mv tmp.json custom_components/ryse/manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/ryse/manifest.json
          git commit -m "Bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Create tag and release
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file changelog.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
